<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Tools - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-center items-center p-4">

    <div id="login-box" class="w-full max-w-md bg-gray-800 border border-gray-750 rounded-2xl p-6 shadow-2xl">
        <div class="text-center mb-6">
            <i class="fa-solid fa-lock-open text-yellow-500 text-4xl mb-2"></i>
            <h2 class="text-xl font-bold text-white">গোপন এডমিন লগইন</h2>
            <p class="text-xs text-gray-400 mt-1">শুধুমাত্র সুপিরিয়র অ্যাক্সেসের জন্য</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">সিক্রেট পিন কোড</label>
                <input type="password" id="admin-pin" placeholder="••••••••" 
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-700 bg-gray-850 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-center tracking-widest font-bold">
            </div>
            <button onclick="checkLogin()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold py-2.5 rounded-xl transition shadow-lg">
                ড্যাশবোর্ডে প্রবেশ করুন
            </button>
            <p id="error-msg" class="text-red-500 text-xs text-center font-semibold hidden">ভুল পিন কোড! আবার চেষ্টা করুন।</p>
        </div>
    </div>

    <div id="dashboard-box" class="w-full max-w-4xl bg-gray-800 border border-gray-750 rounded-2xl p-6 shadow-2xl hidden">
        <div class="flex justify-between items-center border-b border-gray-750 pb-4 mb-6">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-crown text-yellow-500 text-2xl"></i>
                <h1 class="text-xl font-black text-white">KING-TOOLS <span class="text-xs font-normal text-yellow-500 ml-2">Админ Панель</span></h1>
            </div>
            <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-3 py-1.5 rounded-xl text-xs font-bold transition">
                <i class="fa-solid fa-power-off mr-1"></i> লগআউট
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-850 p-4 rounded-xl border border-gray-700">
                <h3 class="text-sm font-bold text-white mb-3"><i class="fa-solid fa-bullhorn text-yellow-500 mr-1"></i> সাইট নোটিশ কন্ট্রোল</h3>
                <textarea id="site-notice" rows="3" placeholder="সাইটের ওপরের নোটিশ এখানে লিখুন..." class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:ring-1 focus:ring-yellow-500"></textarea>
                <button onclick="updateNotice()" class="mt-3 bg-yellow-500 text-gray-950 font-bold text-xs px-4 py-2 rounded-lg hover:bg-yellow-600 transition">নোটিশ আপডেট করুন</button>
            </div>

            <div class="bg-gray-850 p-4 rounded-xl border border-gray-700">
                <h3 class="text-sm font-bold text-white mb-3"><i class="fa-solid fa-toggle-on text-yellow-500 mr-1"></i> টুলস অন / অফ স্ট্যাটাস</h3>
                <div class="space-y-3 text-xs">
                    <div class="flex justify-between items-center bg-gray-800 p-2.5 rounded-lg border border-gray-700">
                        <span><i class="fa-solid fa-video text-red-500 mr-1"></i> ভিডিও ডাউনলোডার</span>
                        <input type="checkbox" id="status-downloader" class="w-4 h-4 accent-yellow-500">
                    </div>
                </div>
                <button onclick="updateTools()" class="mt-4 bg-yellow-500 text-gray-950 font-bold text-xs px-4 py-2 rounded-lg hover:bg-yellow-600 transition">স্ট্যাটাস সেভ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // আপনার প্রোভাইড করা আসল ফায়ারবেস কনফিগ চাবি
        const firebaseConfig = {
            apiKey: "AIzaSyCGrVFdkdGs11nFdsyr0f7AS6V4vjLzN2o",
            authDomain: "message-d99a6.firebaseapp.com",
            databaseURL: "https://message-d99a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "message-d99a6",
            storageBucket: "message-d99a6.firebasestorage.app",
            messagingSenderId: "828306753446",
            appId: "1:828306753446:web:d6363b79a54fa4fee37167",
            measurementId: "G-NSXRR9JR1K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // আপনার গোপন পিন কোড (এখানে আপনি যেকোনো পিন পরিবর্তন করতে পারেন)
        const MASTER_PIN = "123456"; 

        window.checkLogin = function() {
            const inputPin = document.getElementById('admin-pin').value;
            if(inputPin === MASTER_PIN) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard-box').classList.remove('hidden');
                loadDatabaseData();
            } else {
                const errMsg = document.getElementById('error-msg');
                errMsg.classList.remove('hidden');
            }
        }

        window.logout = function() {
            document.getElementById('admin-pin').value = "";
            document.getElementById('login-box').classList.remove('hidden');
            document.getElementById('dashboard-box').classList.add('hidden');
        }

        function loadDatabaseData() {
            // ডাটাবেজ থেকে ডেটা এনে ড্যাশবোর্ডে সেট করা
            onValue(ref(db, 'site_settings'), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('site-notice').value = data.notice || "";
                    document.getElementById('status-downloader').checked = data.downloader_active !== false;
                }
            });
        }

        window.updateNotice = function() {
            const noticeText = document.getElementById('site-notice').value;
            set(ref(db, 'site_settings/notice'), noticeText)
                .then(() => alert('নোটিশ সফলভাবে ডাটাবেজে আপডেট হয়েছে!'))
                .catch(err => alert('এরর: ' + err.message));
        }

        window.updateTools = function() {
            const isDownloaderActive = document.getElementById('status-downloader').checked;
            set(ref(db, 'site_settings/downloader_active'), isDownloaderActive)
                .then(() => alert('টুল স্ট্যাটাস সফলভাবে সেভ হয়েছে!'))
                .catch(err => alert('এরর: ' + err.message));
        }
    </script>
</body>
</html>
