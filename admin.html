        </div>
        <div class="space-y-4">
            <input type="password" id="admin-pin" placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-gray-700 bg-gray-850 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-center tracking-widest font-bold">
            <button onclick="checkLogin()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold py-2.5 rounded-xl transition shadow-lg">লগইন করুন</button>
        </div>
    </div>

    <div id="dashboard-box" class="w-full max-w-5xl bg-gray-800 border border-gray-750 rounded-2xl p-6 shadow-2xl hidden">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-gray-850 p-4 rounded-xl border border-gray-700 space-y-3">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">টুলের নাম</label>
                        <input type="text" id="tool-name" placeholder="যেমন: ইউআরএল শর্টনার" class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">FontAwesome আইকন ক্লাস</label>
                        <input type="text" id="tool-icon" value="fa-screwdriver-wrench" class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] text-gray-400 mb-1">টুলের সংক্ষিপ্ত বিবরণ (Short Description)</label>
                    <input type="text" id="tool-desc" placeholder="টুলটির কাজ সংক্ষেপে লিখুন..." class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-[11px] text-yellow-500 font-bold mb-1"><i class="fa-solid fa-terminal mr-1"></i> টুলের সম্পূর্ণ সোর্স কোড (HTML/CSS/JS একসাথে)</label>
                    <textarea id="tool-source" rows="12" placeholder="এখানে আপনার টুলের সম্পূর্ণ HTML/CSS/JavaScript কোড পেস্ট করুন..." class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-green-400 font-mono focus:outline-none focus:ring-1 focus:ring-yellow-500"></textarea>
                </div>
                <button onclick="addNewTool()" class="w-full bg-yellow-500 text-gray-950 font-bold text-xs py-2.5 rounded-lg hover:bg-yellow-600 transition">সরাসরি সাইটে পাবলিশ করুন</button>
            </div>

            <div class="space-y-4">
                <div class="bg-gray-850 p-4 rounded-xl border border-gray-700">
                    <h3 class="text-sm font-bold text-white mb-2"><i class="fa-solid fa-bullhorn text-yellow-500 mr-1"></i> সাইট নোটিশ</h3>
                    <textarea id="site-notice" rows="2" class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none"></textarea>
                    <button onclick="updateNotice()" class="mt-2 w-full bg-gray-700 text-white text-xs py-1.5 rounded-lg hover:bg-yellow-500 hover:text-gray-950 transition">নোটিশ আপডেট</button>
                </div>

                <div class="bg-gray-850 p-4 rounded-xl border border-gray-700">
                    <h3 class="text-sm font-bold text-white mb-2"><i class="fa-solid fa-list text-yellow-500 mr-1"></i> লাইভ টুলস তালিকা</h3>
                    <div id="admin-tools-list" class="space-y-2 max-h-60 overflow-y-auto pr-1 text-xs"></div>
                </div>
            </div>
        </div>
    </div>
