<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Tools - 100% Secure Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-center items-center p-4">

    <div id="login-box" class="w-full max-w-md bg-gray-800 border border-gray-750 rounded-2xl p-6 shadow-2xl">
        <div class="text-center mb-6">
            <i class="fa-solid fa-shield-halved text-green-500 text-4xl mb-2"></i>
            <h2 class="text-xl font-bold text-white">ফায়ারবেস অথ লগইন</h2>
            <p class="text-xs text-gray-400 mt-1">আপনার ডাটাবেজ এখন সম্পূর্ণ হ্যাক-প্রুফ</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-[11px] text-gray-400 mb-1">এডমিন ইমেইল</label>
                <input type="email" id="admin-email" placeholder="যেমন: admin@kingtools.com" class="w-full px-4 py-2 bg-gray-850 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-[11px] text-gray-400 mb-1">সিক্রেট পাসওয়ার্ড</label>
                <input type="password" id="admin-password" placeholder="••••••••" class="w-full px-4 py-2 bg-gray-850 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <button onclick="checkLogin()" class="w-full bg-green-500 hover:bg-green-600 text-gray-950 font-bold py-2.5 rounded-xl transition shadow-lg">লগইন করুন</button>
        </div>
    </div>

    <div id="dashboard-box" class="w-full max-w-5xl bg-gray-800 border border-gray-750 rounded-2xl p-6 shadow-2xl hidden">
        <div class="flex justify-between items-center border-b border-gray-750 pb-4 mb-4">
            <h1 class="text-xl font-black text-white"><i class="fa-solid fa-crown text-yellow-500 mr-1"></i> KING-TOOLS SECURE PANEL</h1>
            <button onclick="logout()" class="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-xl text-xs font-bold transition">লগআউট</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-gray-850 p-4 rounded-xl border border-gray-700 space-y-3">
                <h3 class="text-sm font-bold text-white mb-1"><i class="fa-solid fa-folder-plus text-yellow-500 mr-1"></i> সোর্স কোডসহ টুল যুক্ত করুন</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">টুলের নাম</label>
                        <input type="text" id="tool-name" placeholder="যেমন: ইউআরএল শর্টনার" class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">FontAwesome আইকন ক্লাস</label>
                        <input type="text" id="tool-icon" value="fa-screwdriver-wrench" class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] text-gray-400 mb-1">টুলের সংক্ষিপ্ত বিবরণ</label>
                    <input type="text" id="tool-desc" placeholder="টুলটির কাজ সংক্ষেপে লিখুন..." class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-[11px] text-yellow-500 font-bold mb-1"><i class="fa-solid fa-terminal mr-1"></i> ٹولز এর সম্পূর্ণ সোর্স কোড (HTML/CSS/JS একসাথে)</label>
                    <textarea id="tool-source" rows="12" placeholder="এখানে আপনার টুলের সম্পূর্ণ HTML/CSS/JavaScript কোড পেস্ট করুন..." class="w-full px-3 py-2 text-xs rounded-lg bg-gray-800 border border-gray-700 text-green-400 font-mono focus:outline-none focus:ring-1 focus:ring-yellow-500"></textarea>
                </div>
                <button onclick="addNewTool()" class="w-full bg-yellow-500 text-gray-950 font-bold text-xs py-2.5 rounded-lg hover:bg-yellow-600 transition">সরাসরি সাইটে পাবলিশ করুন</button>
            </div>

            <div class="space-y-4">
                <div class="bg-gray-850 p-4 rounded-xl border border-gray-700">
                    <h3 class="text-sm font-bold text-white mb-2"><i class="fa-solid fa-bullhorn text-yellow-500 mr-1"></i> সাইট নোটিশ</h3>
                    <textarea id="site-notice" rows="2" class="w-full px-3 py-2 text-xs rounded-lg bg-gray-850 border border-gray-700 text-white focus:outline-none"></textarea>
                    <button onclick="updateNotice()" class="mt-2 w-full bg-gray-700 text-white text-xs py-1.5 rounded-lg hover:bg-yellow-500 hover:text-gray-950 transition">নোটিশ আপডেট</button>
                </div>

                <div class="bg-gray-850 p-4 rounded-xl border border-gray-700">
                    <h3 class="text-sm font-bold text-white mb-2"><i class="fa-solid fa-list text-yellow-500 mr-1"></i> লাইভ টুলস তালিকা</h3>
                    <div id="admin-tools-list" class="space-y-2 max-h-60 overflow-y-auto pr-1 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVFdkdGs11nFdsyr0f7AS6V4vjLzN2o",
            authDomain: "message-d99a6.firebaseapp.com",
            databaseURL: "https://message-d99a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "message-d99a6",
            storageBucket: "message-d99a6.firebasestorage.app",
            messagingSenderId: "828306753446",
            appId: "1:828306753446:web:d6363b79a54fa4fee37167",
            measurementId: "G-NSXRR9JR1K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // রিয়েলটাইম সেশন হ্যান্ডলার (পেজ রিফ্রেশ দিলেও লগআউট হবে না)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard-box').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('dashboard-box').classList.add('hidden');
            }
        });

        window.checkLogin = function() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            if(!email || !password) { alert('ইমেইল এবং পাসওয়ার্ড দুটিই দিন!'); return; }

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { alert('সাফল্যের সাথে লগইন হয়েছে!'); })
                .catch((error) => { alert('লগইন ব্যর্থ: ' + error.message); });
        };

        window.logout = function() {
            signOut(auth).then(() => { alert('লগআউট সম্পন্ন হয়েছে!'); });
        };

        function loadData() {
            onValue(ref(db, 'site_settings/notice'), (snap) => {
                document.getElementById('site-notice').value = snap.val() || "";
            });

            onValue(ref(db, 'tools'), (snap) => {
                const listDiv = document.getElementById('admin-tools-list');
                listDiv.innerHTML = "";
                const data = snap.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        listDiv.innerHTML += `
                            <div class="flex justify-between items-center bg-gray-800 p-2 rounded border border-gray-700">
                                <span class="truncate max-w-[180px]">${data[key].name}</span>
                                <button onclick="deleteTool('${key}')" class="text-red-500 hover:text-red-400 p-1"><i class="fa-solid fa-trash"></i></button>
                            </div>`;
                    });
                } else {
                    listDiv.innerHTML = "<p class='text-gray-500 text-center py-2'>কোনো টুল নেই।</p>";
                }
            });
        }

        window.addNewTool = function() {
            const name = document.getElementById('tool-name').value;
            const desc = document.getElementById('tool-desc').value;
            const icon = document.getElementById('tool-icon').value;
            const source = document.getElementById('tool-source').value;

            if (!name || !desc || !source) { alert('সবগুলো ঘর পূরণ করুন!'); return; }

            const newRef = push(ref(db, 'tools'));
            set(newRef, { name, desc, icon, source })
                .then(() => {
                    alert('পুরো সোর্স কোডসহ টুলটি লাইভ হয়েছে!');
                    document.getElementById('tool-name').value = "";
                    document.getElementById('tool-desc').value = "";
                    document.getElementById('tool-source').value = "";
                }).catch(err => alert('ত্রুটি: ' + err.message));
        };

        window.deleteTool = function(key) {
            if (confirm('টুলটি মুছে ফেলতে চান?')) { 
                remove(ref(db, `tools/${key}`))
                .then(() => alert('টুলটি সফলভাবে ডিলিট করা হয়েছে!'))
                .catch((err) => alert('ডিলিট করতে সমস্যা হয়েছে: ' + err.message));
            }
        };

        window.updateNotice = function() {
            set(ref(db, 'site_settings/notice'), document.getElementById('site-notice').value)
                .then(() => alert('নোটিশ আপডেট হয়েছে!'))
                .catch(err => alert('ত্রুটি: ' + err.message));
        };
    </script>
</body>
</html>
