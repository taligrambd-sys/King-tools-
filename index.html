<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Tools - All in One Premium Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            if (body.classList.contains('bg-gray-900')) {
                body.classList.remove('bg-gray-900', 'text-gray-100');
                body.classList.add('bg-gray-50', 'text-gray-900');
                document.querySelectorAll('.tool-card').forEach(card => {
                    card.classList.remove('bg-gray-800', 'border-gray-700');
                    card.classList.add('bg-white', 'border-gray-200');
                });
                document.getElementById('main-nav').classList.remove('bg-gray-800', 'border-gray-750');
                document.getElementById('main-nav').classList.add('bg-white', 'border-gray-200');
                document.getElementById('nav-title').classList.remove('text-white');
                document.getElementById('nav-title').classList.add('text-gray-900');
                document.getElementById('main-footer').classList.remove('bg-gray-100', 'border-gray-200');
                document.getElementById('main-footer').classList.add('bg-gray-950', 'border-gray-850');
                themeIcon.className = 'fa-solid fa-moon text-xl text-gray-700';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('bg-gray-50', 'text-gray-900');
                body.classList.add('bg-gray-900', 'text-gray-100');
                document.querySelectorAll('.tool-card').forEach(card => {
                    card.classList.remove('bg-white', 'border-gray-200');
                    card.classList.add('bg-gray-800', 'border-gray-700');
                });
                document.getElementById('main-nav').classList.remove('bg-white', 'border-gray-200');
                document.getElementById('main-nav').classList.add('bg-gray-800', 'border-gray-750');
                document.getElementById('nav-title').classList.remove('text-gray-900');
                document.getElementById('nav-title').classList.add('text-white');
                themeIcon.className = 'fa-solid fa-sun text-xl text-yellow-400';
                localStorage.setItem('theme', 'dark');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                localStorage.setItem('theme', 'dark');
                toggleTheme();
            }
        });

        function filterTools() {
            const searchInput = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('.tool-card').forEach(card => {
                const title = card.querySelector('.tool-title').innerText.toLowerCase();
                const desc = card.querySelector('.tool-desc').innerText.toLowerCase();
                card.style.display = (title.includes(searchInput) || desc.includes(searchInput)) ? 'flex' : 'none';
            });
        }
    </script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <nav id="main-nav" class="bg-gray-800 border-b border-gray-750 px-4 py-3 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-crown text-yellow-500 text-2xl"></i>
            <span id="nav-title" class="text-xl font-black tracking-wider text-white">KING-<span class="text-yellow-500">TOOLS</span></span>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-700/50 transition focus:outline-none">
            <i id="theme-icon" class="fa-solid fa-sun text-xl text-yellow-400"></i>
        </button>
    </nav>

    <div id="site-notice-bar" class="max-w-7xl mx-auto w-full px-4 mt-4 hidden">
        <div class="bg-yellow-500 text-gray-950 p-3 rounded-xl text-center text-xs font-bold shadow-md">
            <i class="fa-solid fa-bullhorn mr-1"></i> <span id="site-notice-text"></span>
        </div>
    </div>

    <header class="max-w-7xl mx-auto w-full px-4 py-8 text-center">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-2">আপনার প্রয়োজনীয় সবツールস এক জায়গায়</h1>
        <p class="text-gray-400 text-sm md:text-base max-w-2xl mx-auto mb-6">সম্পূর্ণ ফ্রিতে ব্যবহার করুন প্রিমিয়াম সব ওয়েব টুলস এবং ডাউনলোডার।</p>
        <div class="max-w-md mx-auto relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-magnifying-glass text-gray-400"></i></div>
            <input type="text" id="search-box" onkeyup="filterTools()" placeholder="প্রয়োজনীয় টুলটি সার্চ করুন..." class="w-full pl-10 pr-4 py-2.5 rounded-full border border-gray-700 bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-sm">
        </div>
    </header>

    <main id="tools-grid" class="max-w-7xl mx-auto w-full px-4 flex-grow grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div id="loading-tools" class="col-span-full text-center py-10 text-gray-400 text-sm">
            <p>টুলস লোড হচ্ছে...</p>
        </div>
    </main>

    <footer id="main-footer" class="bg-gray-950 text-gray-500 text-xs text-center py-4 border-t border-gray-850 mt-auto">
        <p>&copy; 2026 King-Tools. All Rights Reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVFdkdGs11nFdsyr0f7AS6V4vjLzN2o",
            authDomain: "message-d99a6.firebaseapp.com",
            databaseURL: "https://message-d99a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "message-d99a6",
            storageBucket: "message-d99a6.firebasestorage.app",
            messagingSenderId: "828306753446",
            appId: "1:828306753446:web:d6363b79a54fa4fee37167",
            measurementId: "G-NSXRR9JR1K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'site_settings/notice'), (snap) => {
            const text = snap.val();
            if(text && text.trim() !== "") {
                document.getElementById('site-notice-text').innerText = text;
                document.getElementById('site-notice-bar').classList.remove('hidden');
            } else { document.getElementById('site-notice-bar').classList.add('hidden'); }
        });

        onValue(ref(db, 'tools'), (snap) => {
            const grid = document.getElementById('tools-grid');
            grid.innerHTML = "";
            const data = snap.val();
            
            if(data) {
                const currentTheme = document.body.classList.contains('bg-gray-900') ? 'dark' : 'light';
                const cardClass = currentTheme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200';
                
                Object.keys(data).forEach(key => {
                    const tool = data[key];
                    grid.innerHTML += `
                        <div class="tool-card ${cardClass} border rounded-2xl p-5 shadow-lg hover:border-yellow-500/50 transition flex flex-col justify-between group">
                            <div>
                                <div class="w-12 h-12 bg-yellow-500/10 rounded-xl flex items-center justify-center text-yellow-500 text-2xl mb-4">
                                    <i class="fa-solid ${tool.icon || 'fa-screwdriver-wrench'}"></i>
                                </div>
                                <h3 class="tool-title text-lg font-bold mb-1">${tool.name}</h3>
                                <p class="tool-desc text-gray-400 text-xs leading-relaxed">${tool.desc}</p>
                            </div>
                            <a href="tool.html?id=${key}" class="mt-5 block text-center bg-gray-750 hover:bg-yellow-500 hover:text-gray-950 text-yellow-500 font-semibold py-2 rounded-xl text-sm transition">
                                টুলটি ব্যবহার করুন <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
                            </a>
                        </div>`;
                });
            } else { grid.innerHTML = "<p class='text-gray-500 text-center col-span-full py-10 text-xs'>কোনো টুল খুঁজে পাওয়া যায়নি!</p>"; }
        });
    </script>
</body>
</html>
