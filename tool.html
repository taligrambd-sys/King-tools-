<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King-Tools - Loading Tool...</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <div id="dynamic-tool-holder" class="w-full min-h-screen">
        <div id="loader" class="flex flex-col items-center justify-center min-h-screen text-gray-400 text-sm">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent text-yellow-500 rounded-full mb-3"></div>
            <p>ডাটাবেজ থেকে টুলের সিকিউর সোর্স কোড রান করা হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGrVFdkdGs11nFdsyr0f7AS6V4vjLzN2o",
            authDomain: "message-d99a6.firebaseapp.com",
            databaseURL: "https://message-d99a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "message-d99a6",
            storageBucket: "message-d99a6.firebasestorage.app",
            messagingSenderId: "828306753446",
            appId: "1:828306753446:web:d6363b79a54fa4fee37167",
            measurementId: "G-NSXRR9JR1K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // URL থেকে টুলের আইডি বের করা
        const urlParams = new URLSearchParams(window.location.search);
        const toolId = urlParams.get('id');

        if (toolId) {
            onValue(ref(db, `tools/${toolId}`), (snapshot) => {
                const tool = snapshot.val();
                if (tool && tool.source) {
                    document.title = "King-Tools - " + tool.name;
                    
                    // সোর্স কোডটি পেজে ইনজেক্ট করা
                    const holder = document.getElementById('dynamic-tool-holder');
                    holder.innerHTML = tool.source;

                    // স্ক্রিপ্ট ট্যাগগুলোকে রান করানোর এক্সট্রা সিকিউরিটি ট্রিক
                    const scripts = holder.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                } else {
                    document.getElementById('dynamic-tool-holder').innerHTML = "<div class='text-center pt-20 text-red-500'>টুলটি ডাটাবেজে পাওয়া যায়নি!</div>";
                }
            });
        } else {
            document.getElementById('dynamic-tool-holder').innerHTML = "<div class='text-center pt-20 text-red-500'>ভুল লিঙ্ক বা ইউআরএল!</div>";
        }
    </script>
</body>
</html>
